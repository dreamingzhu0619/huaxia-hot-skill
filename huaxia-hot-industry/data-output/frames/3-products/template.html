<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=375, initial-scale=1">
    <title>关联产品</title>
    <link rel="stylesheet" href="./assets/product-section.css">
  </head>
  <body>
    <main class="products-page">
      <section class="products-section" aria-labelledby="products-title">
        <h2 id="products-title" class="frame-title">关联产品</h2>
        <p class="intro-block">半导体行业波动显著，机遇与风险并存。对于波动承受有限的投资者，不妨以小仓位先行参与，或通过定投分批买入。</p>
        <div class="product-stack">
          <div class="strategy-tabs">
            <div class="strategy-tab is-active">
              <span class="strategy-tab__title">追求超额</span>
              <span class="strategy-tab__desc">主动研判 调仓灵活</span>

            <div class="strategy-tab">

              <span class="strategy-tab__desc">被动复制 持仓透明</span>
            </div>
          </div>
          <div class="product-list">
            <article class="product-card">
              <div class="product-main">
                <div class="product-row">
                  <div class="product-name">永赢先锋半导体智选C</div>
                  <a class="product-detail" href="#">详情 &gt;</a>
                </div>
                <div class="product-tags">
                  <span class="product-tag">025209</span>
                  <span class="product-tag">R4中高风险</span>
                </div>
                <span class="metric-label">近1年涨跌幅</span>
              </div>
              <button class="buy-button" type="button">
                <span class="buy-button__text">买入</span>
              </button>
            </article>
            <article class="product-card">
              <div class="product-main">
                <div class="product-row">
                  <div class="product-name">华夏半导体龙头C</div>
                  <a class="product-detail" href="#">详情 &gt;</a>
                </div>
                <div class="product-tags">
                  <span class="product-tag">016501</span>
                  <span class="product-tag">R4中高风险</span>
                </div>
                <span class="metric-label">近1年涨跌幅</span>
              </div>
              <button class="buy-button" type="button">
                <span class="buy-button__text">买入</span>
              </button>
            </article>
          </div>
          <a class="more-button" href="#">查看更多</a>
        </div>
      </section>
    </main>

</html>
